name: Supabase Release Verification

on:
  pull_request:
    paths:
      - '.github/workflows/supabase-release-verification.yml'
      - 'scripts/verify-supabase-release.sh'
      - 'supabase/**'
      - 'src/rules.js'
      - 'src/expansion.js'
      - 'src/fetchAllPages.js'
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment containing Supabase credentials
        required: true
        type: choice
        default: production
        options:
          - staging
          - production
      confirmation:
        description: Type DEPLOY to permit remote changes
        required: true
        type: string
      apply_migrations:
        description: Apply pending Supabase migrations
        required: true
        type: boolean
        default: true
      deploy_function:
        description: Deploy reconcile-achievements
        required: true
        type: boolean
        default: true
      run_smoke_tests:
        description: Run disposable-user security and concurrency tests
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: supabase-release-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'validation' }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate workflow and function source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate GitHub Actions syntax
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 -shellcheck=

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Edge Function bundle
        run: deno check supabase/functions/reconcile-achievements/index.ts

      - name: Parse release verification script
        run: bash -n scripts/verify-supabase-release.sh

  deploy-and-verify:
    name: Deploy and verify Supabase
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || vars.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      APPLY_MIGRATIONS: ${{ inputs.apply_migrations }}
      DEPLOY_FUNCTION: ${{ inputs.deploy_function }}
      RUN_SMOKE_TESTS: ${{ inputs.run_smoke_tests }}
    steps:
      - name: Require explicit confirmation
        if: inputs.confirmation != 'DEPLOY'
        run: |
          echo 'Confirmation must be exactly DEPLOY.' >&2
          exit 1

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy and run live verification
        run: bash scripts/verify-supabase-release.sh

      - name: Write verification summary
        if: always()
        run: |
          {
            echo '## Supabase release verification'
            echo
            echo "- Environment: ${{ inputs.environment }}"
            echo "- Project ref: $SUPABASE_PROJECT_REF"
            echo "- Migrations requested: $APPLY_MIGRATIONS"
            echo "- Function deployment requested: $DEPLOY_FUNCTION"
            echo "- Smoke tests requested: $RUN_SMOKE_TESTS"
          } >> "$GITHUB_STEP_SUMMARY"
