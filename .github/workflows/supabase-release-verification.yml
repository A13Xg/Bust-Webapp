name: Supabase Release Verification

on:
  pull_request:
    paths:
      - '.github/workflows/supabase-release-verification.yml'
      - 'supabase/**'
      - 'src/rules.js'
      - 'src/expansion.js'
      - 'src/fetchAllPages.js'
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment containing Supabase credentials
        required: true
        type: choice
        default: production
        options:
          - staging
          - production
      confirmation:
        description: Type DEPLOY to permit remote changes
        required: true
        type: string
      apply_migrations:
        description: Apply pending Supabase migrations
        required: true
        type: boolean
        default: true
      deploy_function:
        description: Deploy reconcile-achievements
        required: true
        type: boolean
        default: true
      run_smoke_tests:
        description: Run disposable-user security and concurrency tests
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: supabase-release-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'validation' }}
  cancel-in-progress: false

jobs:
  validate-workflow:
    name: Validate workflow and function sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate GitHub Actions syntax
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate function bundle
        run: supabase functions serve reconcile-achievements --no-verify-jwt &

      - name: Wait for local function runtime
        run: |
          for attempt in {1..30}; do
            if curl --silent --fail http://127.0.0.1:54321/functions/v1/reconcile-achievements \
              -X OPTIONS >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo 'Local Edge Function did not become ready.' >&2
          exit 1

  deploy-and-verify:
    name: Deploy and verify Supabase
    if: github.event_name == 'workflow_dispatch'
    needs: validate-workflow
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 30
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || vars.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Require explicit confirmation
        if: inputs.confirmation != 'DEPLOY'
        run: |
          echo 'Confirmation must be exactly DEPLOY.' >&2
          exit 1

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required credentials
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub Environment secret or variable: $name" >&2
              missing=1
            fi
          done
          if [ "${{ inputs.run_smoke_tests }}" = 'true' ]; then
            for name in SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
              if [ -z "${!name:-}" ]; then
                echo "Missing smoke-test secret: $name" >&2
                missing=1
              fi
            done
          fi
          exit "$missing"

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Preview pending migrations
        run: supabase db push --dry-run --include-all

      - name: Apply pending migrations
        if: inputs.apply_migrations
        run: supabase db push --include-all --yes

      - name: Deploy reconciliation function
        if: inputs.deploy_function
        run: supabase functions deploy reconcile-achievements --project-ref "$SUPABASE_PROJECT_REF" --use-api

      - name: Verify deployed function configuration
        if: inputs.deploy_function
        run: |
          set -euo pipefail
          status=$(curl --silent --output /tmp/unauthorized.json --write-out '%{http_code}' \
            --request POST \
            --header "apikey: $SUPABASE_ANON_KEY" \
            "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/reconcile-achievements")
          test "$status" = '401'

      - name: Run disposable-user live smoke tests
        if: inputs.run_smoke_tests
        shell: bash
        run: |
          set -euo pipefail
          base="https://${SUPABASE_PROJECT_REF}.supabase.co"
          email="release-check-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@bust-ops.invalid"
          password="ReleaseCheck-${GITHUB_RUN_ID}-Aa1!"
          user_id=''

          cleanup() {
            if [ -n "$user_id" ]; then
              curl --silent --show-error --fail \
                --request DELETE \
                --header "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                --header "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
                "$base/auth/v1/admin/users/$user_id" >/dev/null || true
            fi
          }
          trap cleanup EXIT

          create=$(curl --silent --show-error --fail \
            --request POST \
            --header "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            --header "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            --header 'Content-Type: application/json' \
            --data "{\"email\":\"$email\",\"password\":\"$password\",\"email_confirm\":true}" \
            "$base/auth/v1/admin/users")
          user_id=$(jq -r '.id' <<<"$create")
          test -n "$user_id" -a "$user_id" != 'null'

          curl --silent --show-error --fail \
            --request POST \
            --header "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            --header "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            --header 'Content-Type: application/json' \
            --header 'Prefer: return=minimal' \
            --data "{\"id\":\"$user_id\",\"username\":\"release_check_${GITHUB_RUN_ID}\",\"avatar_seed\":\"release-check\"}" \
            "$base/rest/v1/profiles" >/dev/null

          session=$(curl --silent --show-error --fail \
            --request POST \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header 'Content-Type: application/json' \
            --data "{\"email\":\"$email\",\"password\":\"$password\"}" \
            "$base/auth/v1/token?grant_type=password")
          token=$(jq -r '.access_token' <<<"$session")
          test -n "$token" -a "$token" != 'null'

          payload="{\"user_id\":\"$user_id\",\"timestamp\":\"2000-01-01T00:00:00.000Z\",\"note\":\"release verification\",\"time_bucket\":\"Night\"}"
          request_bust() {
            curl --silent --output "$1" --write-out '%{http_code}' \
              --request POST \
              --header "apikey: $SUPABASE_ANON_KEY" \
              --header "Authorization: Bearer $token" \
              --header 'Content-Type: application/json' \
              --header 'Prefer: return=representation' \
              --data "$payload" \
              "$base/rest/v1/busts"
          }
          request_bust /tmp/bust-a.json >/tmp/status-a &
          pid_a=$!
          request_bust /tmp/bust-b.json >/tmp/status-b &
          pid_b=$!
          wait "$pid_a" || true
          wait "$pid_b" || true
          statuses=$(printf '%s\n%s\n' "$(cat /tmp/status-a)" "$(cat /tmp/status-b)" | sort)
          successes=$(grep -c '^201$' <<<"$statuses" || true)
          test "$successes" -eq 1

          forged_status=$(curl --silent --output /tmp/forged.json --write-out '%{http_code}' \
            --request POST \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $token" \
            --header 'Content-Type: application/json' \
            --data "{\"user_id\":\"$user_id\",\"achievement_type\":\"forged_release_check\"}" \
            "$base/rest/v1/achievements")
          test "$forged_status" -ge 400

          invoke() {
            curl --silent --show-error --fail \
              --request POST \
              --header "apikey: $SUPABASE_ANON_KEY" \
              --header "Authorization: Bearer $token" \
              --header 'Content-Type: application/json' \
              "$base/functions/v1/reconcile-achievements"
          }
          invoke >/tmp/reconcile-1.json
          invoke >/tmp/reconcile-2.json
          jq -e '.achievements | type == "array"' /tmp/reconcile-1.json >/dev/null
          jq -S '[.achievements[].achievement_type] | sort' /tmp/reconcile-1.json >/tmp/types-1.json
          jq -S '[.achievements[].achievement_type] | sort' /tmp/reconcile-2.json >/tmp/types-2.json
          diff -u /tmp/types-1.json /tmp/types-2.json

      - name: Write verification summary
        if: always()
        run: |
          {
            echo '## Supabase release verification'
            echo
            echo "- Environment: ${{ inputs.environment }}"
            echo "- Project ref: $SUPABASE_PROJECT_REF"
            echo "- Migrations requested: ${{ inputs.apply_migrations }}"
            echo "- Function deployment requested: ${{ inputs.deploy_function }}"
            echo "- Smoke tests requested: ${{ inputs.run_smoke_tests }}"
          } >> "$GITHUB_STEP_SUMMARY"
