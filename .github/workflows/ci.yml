name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-build:
    name: Test, database check, and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bust
          POSTGRES_PASSWORD: bust
          POSTGRES_DB: bust_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bust -d bust_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://bust:bust@127.0.0.1:5432/bust_test
      PGSSLMODE: disable
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Prepare database schema
        run: npm run db:migrate
      - name: Unit tests
        run: npm test
      - name: Test coverage
        run: npm run test:coverage
      - name: Database connection check
        run: npm run db:check
      - name: Build webpage
        env:
          GHPAGES_BASE: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
